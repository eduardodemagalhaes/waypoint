<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1814;--ink2:#4a4540;--ink3:#8a847c;--ink4:#c4bdb4;
  --paper:#f5f0e8;--paper2:#ede7da;--paper3:#e0d8cc;
  --accent:#c4611a;--accent2:#e8834a;
  --green:#2e7d4f;--blue:#1a4a7a;--red:#b03030;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r:8px;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--paper3);
  display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:54px}
.logo{font-family:var(--serif);font-size:19px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.hdr-right{display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:6px;
  cursor:pointer;border:1px solid transparent;transition:all .15s;letter-spacing:.01em}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--paper3)}
.btn-ghost:hover{background:var(--paper2);color:var(--ink)}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-primary:hover{background:var(--ink2)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent2)}
.btn-danger{background:transparent;color:var(--red);border-color:transparent;padding:4px 8px;font-size:12px}
.btn-danger:hover{background:#fdecea}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── LAYOUT ── */
.app{display:flex;min-height:calc(100vh - 49px)}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--paper3);
  background:var(--paper2);padding:12px 0;overflow-y:auto;
  position:sticky;top:49px;height:calc(100vh - 49px)}
.sidebar-section{padding:6px 14px 2px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);margin-top:8px}
.sidebar-section:first-child{margin-top:0}
.sidebar-item{display:flex;flex-direction:column;padding:8px 14px;cursor:pointer;
  border-radius:0;transition:background .1s;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--paper3)}
.sidebar-item.active{background:var(--paper);border-left-color:var(--accent)}
.sidebar-item-name{font-size:13px;font-weight:500;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item.active .sidebar-item-name{color:var(--accent)}
.sidebar-item-date{font-size:11px;color:var(--ink3);margin-top:1px}
.sidebar-item-seg{font-size:10px;color:var(--ink4);margin-top:1px}
.sidebar-new{display:flex;align-items:center;gap:6px;padding:8px 14px;
  cursor:pointer;color:var(--accent);font-size:13px;font-weight:500;
  margin-top:4px;border-left:3px solid transparent}
.sidebar-new:hover{background:var(--paper3)}
.main{flex:1;min-width:0;padding:2rem 1.5rem;max-width:760px}
@media(max-width:700px){
  .sidebar{display:none}
  .sidebar.mob-open{display:block;position:fixed;left:0;top:49px;z-index:90;
    height:calc(100vh - 49px);box-shadow:4px 0 16px rgba(0,0,0,.1)}
  .mob-overlay{display:none;position:fixed;inset:0;top:49px;background:rgba(0,0,0,.3);z-index:89}
  .mob-overlay.open{display:block}
}

/* ── TRIP BAR ── */
.trip-bar{display:flex;align-items:baseline;gap:10px;margin-bottom:1.5rem;position:relative}
.trip-name{font-family:var(--serif);font-size:28px;letter-spacing:-.02em;cursor:pointer;transition:color .15s}
.trip-name:hover{color:var(--accent)}
.trip-caret{font-size:11px;color:var(--ink3);cursor:pointer}
.trip-meta{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;font-weight:300}

/* ── TRIP DROPDOWN ── */
.trip-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--paper);
  border:1px solid var(--paper3);border-radius:10px;min-width:220px;
  box-shadow:0 8px 24px rgba(0,0,0,.09);z-index:50;overflow:hidden}
.trip-dd.open{display:block}
.trip-dd-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--paper2);font-size:13px;transition:background .1s}
.trip-dd-item:last-child{border-bottom:none}
.trip-dd-item:hover{background:var(--paper2)}
.trip-dd-name{font-weight:500}
.trip-dd-date{font-size:11px;color:var(--ink3);margin-top:1px}
.trip-dd-new{color:var(--accent);font-weight:500}

/* ── STATUS BAR ── */
.status{display:flex;gap:0;margin-bottom:1.75rem;background:var(--paper2);
  border:1px solid var(--paper3);border-radius:var(--r);overflow:hidden}
.status-item{flex:1;padding:10px 14px;border-right:1px solid var(--paper3)}
.status-item:last-child{border-right:none}
.status-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:500}
.status-val{font-size:14px;font-weight:500;color:var(--ink);margin-top:1px}
.status-val.accent{color:var(--accent)}

/* ── BANNER ── */
.banner{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r);
  margin-bottom:1.25rem;font-size:13px}
.banner-warn{background:#fef3e8;border:1px solid #f5d5b0;color:var(--accent)}
.banner-ok{background:#e8f5ef;border:1px solid #b0d5be;color:var(--green)}

/* ── NL BAR ── */
.nl-bar{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--r);
  margin-bottom:1.25rem;overflow:hidden;transition:border-color .2s}
.nl-bar:focus-within{border-color:var(--ink4)}
.nl-bar.dialog-active{border-color:var(--accent);border-width:1.5px}

.nl-input-row{display:flex;align-items:center;gap:8px;padding:8px 12px}
.nl-icon{color:var(--accent);font-size:16px;flex-shrink:0}
.nl-input{flex:1;border:none;background:transparent;font-family:var(--sans);font-size:14px;
  color:var(--ink);outline:none}
.nl-input::placeholder{color:var(--ink4)}
.nl-input:disabled{opacity:.5}

/* ── DIALOG THREAD ── */
.dialog-thread{padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.dialog-msg{font-size:13px;line-height:1.55;padding:8px 11px;border-radius:8px;max-width:92%}
.dialog-msg.bot{background:var(--paper3);color:var(--ink2);align-self:flex-start;border-radius:4px 8px 8px 8px}
.dialog-msg.user{background:var(--ink);color:var(--paper);align-self:flex-end;border-radius:8px 4px 8px 8px}
.dialog-msg.thinking{background:var(--paper3);color:var(--ink3);font-style:italic;align-self:flex-start}

/* ── SUMMARY CARD ── */
.summary-card{margin:0 12px 12px;border:1px solid var(--paper3);border-radius:8px;overflow:hidden}
.summary-header{background:var(--ink);color:var(--paper);padding:8px 12px;
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px}
.summary-body{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.sum-field{min-width:0}
.sum-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);font-weight:500}
.sum-val{font-size:13px;color:var(--ink);margin-top:1px;word-break:break-word}
.sum-val.null{color:var(--ink4);font-style:italic}
.av-note{margin:0 12px 10px;padding:8px 11px;background:#fef3e8;border:1px solid #f5d5b0;
  border-radius:6px;font-size:12px;color:var(--accent);line-height:1.5;display:flex;gap:8px}
.av-note-icon{flex-shrink:0;margin-top:1px}
.timetable-note{margin:0 12px 6px;padding:8px 11px;border-radius:6px;font-size:0.82rem;display:flex;align-items:flex-start;gap:8px;}
.tt-ok{background:#e6f4ea;color:#1a6e31;border:1px solid #a8d5b0;}
.tt-warn{background:#fff3e0;color:#8a4a00;border:1px solid #f5c97a;}
.summary-footer{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--paper3)}

/* ── TIMELINE ── */
.day-label{display:flex;align-items:center;gap:10px;padding:8px 0;
  position:sticky;top:54px;background:var(--paper);z-index:10}
.day-date{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink3);white-space:nowrap}
.day-line{flex:1;height:1px;background:var(--paper3)}

.seg{display:grid;grid-template-columns:50px 1fr;gap:0 14px;margin-bottom:2px}
.seg-tc{display:flex;flex-direction:column;align-items:center;padding-top:16px}
.seg-time{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink2);white-space:nowrap}
.seg-line{width:1px;flex:1;background:var(--paper3);margin-top:5px;min-height:14px}

.seg-card{background:var(--paper);border:1px solid var(--paper3);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.seg-card:hover{border-color:var(--ink4);background:var(--paper2)}
.seg-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.seg-card.flight::before{background:var(--blue)}
.seg-card.hotel::before{background:var(--accent)}
.seg-card.train::before{background:var(--green)}
.seg-card.car::before{background:var(--ink3)}
.seg-card.activity::before{background:#7a4a9a}
.seg-card.taxi::before{background:#8b5e00}
.seg-card.other::before{background:var(--ink4)}

.seg-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.seg-icon{font-size:15px;line-height:1;margin-top:2px;flex-shrink:0}
.seg-main{flex:1;min-width:0}
.seg-route{font-family:var(--serif);font-size:16px;letter-spacing:-.01em;color:var(--ink)}
.seg-route .arr{color:var(--ink4);font-size:13px;margin:0 5px}
.seg-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.seg-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.conf-ref{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}

.badge{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;padding:2px 6px;border-radius:4px}
.badge-ok{background:#e8f5ef;color:var(--green)}
.badge-pending{background:#fef3e8;color:var(--accent)}
.badge-review{background:#fdecea;color:var(--red)}

.seg-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--paper3);
  grid-template-columns:repeat(3,1fr);gap:8px}
.seg-detail.open{display:grid}
.det-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:500}
.det-val{font-size:13px;color:var(--ink);margin-top:1px}
.det-val.warn{color:var(--red)}
.seg-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--paper3)}

/* ── NIGHT BRIDGE ── */
.bridge{display:grid;grid-template-columns:50px 1fr;gap:0 14px;margin-bottom:2px}
.bridge-line{display:flex;justify-content:center}
.bridge-bar{width:1px;height:28px;background:repeating-linear-gradient(
  to bottom,var(--accent) 0,var(--accent) 4px,transparent 4px,transparent 8px);opacity:.35}
.bridge-lbl{display:flex;align-items:center;font-size:11px;color:var(--ink3);letter-spacing:.03em}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:3rem 1rem}
.empty-title{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.7}
.loading{text-align:center;padding:3rem;color:var(--ink3);font-size:13px;font-style:italic}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,24,20,.55);
  z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--paper);border-radius:12px;padding:24px;width:100%;max-width:460px;
  border:1px solid var(--paper3);max-height:90vh;overflow-y:auto;
  animation:slideUp .2s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:var(--serif);font-size:21px;letter-spacing:-.02em;margin-bottom:18px}
.form-row{margin-bottom:13px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);
  font-weight:500;display:block;margin-bottom:5px}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--paper3);border-radius:6px;
  font-family:var(--sans);font-size:14px;background:var(--paper);color:var(--ink);
  outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--ink4);background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.type-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.type-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;
  border:1px solid var(--paper3);border-radius:8px;cursor:pointer;background:var(--paper);
  transition:all .15s;font-family:var(--sans)}
.type-btn:hover{border-color:var(--ink4);background:var(--paper2)}
.type-btn.sel{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.type-btn-icon{font-size:17px;line-height:1}
.type-btn-lbl{font-size:9px;font-weight:500;letter-spacing:.04em;color:var(--ink3);text-transform:uppercase}
.type-btn.sel .type-btn-lbl{color:var(--ink4)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;
  padding-top:14px;border-top:1px solid var(--paper3)}
.trip-modal{max-width:380px}

.edit-assist-msg{font-size:12px;line-height:1.5;padding:6px 10px;border-radius:8px;max-width:95%}
.edit-assist-msg.bot{background:var(--paper3);color:var(--ink2);align-self:flex-start}
.edit-assist-msg.user{background:var(--ink);color:var(--paper);align-self:flex-end}

.datepicker-wrap{position:relative}
.cal-popup{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;
  background:var(--paper);border:1px solid var(--paper3);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px;min-width:240px;user-select:none}
.cal-popup.open{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-month{font-weight:600;font-size:13px}
.cal-nav{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 6px;
  color:var(--ink2);border-radius:4px}
.cal-nav:hover{background:var(--paper2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;text-align:center;color:var(--ink3);font-weight:500;padding:2px}
.cal-day{font-size:12px;text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;
  color:var(--ink2)}
.cal-day:hover{background:var(--paper2)}
.cal-day.today{font-weight:700;color:var(--accent)}
.cal-day.sel{background:var(--ink);color:var(--paper)}
.cal-day.other{color:var(--ink4)}
.cal-day.empty{pointer-events:none}

/* ── HOTEL CARD ── */
.hotel-dates{display:flex;align-items:center;gap:8px;margin:4px 0 3px;flex-wrap:wrap}
.hotel-ci,.hotel-co{font-size:12px;color:var(--ink2);font-weight:400}
.hotel-dt-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);font-weight:500;margin-right:3px}
.hotel-arrow{color:var(--ink4);font-size:11px}
.hotel-phone{font-size:11px;color:var(--ink3);margin-top:2px}
.hotel-addr{font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px}

/* ── TIME STRIP ── */
.time-strip{display:flex;align-items:center;gap:6px;margin:4px 0 2px;font-family:var(--mono);font-size:12px}
.ts-dep{font-weight:500;color:var(--ink);white-space:nowrap}
.ts-arr{font-weight:500;color:var(--ink);white-space:nowrap}
.ts-arr.ts-unknown{color:var(--ink4);font-style:italic;font-family:var(--sans);font-size:11px;font-weight:400}
.ts-line{flex:1;height:1px;background:var(--paper3);position:relative;min-width:20px}
.ts-dur{position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--ink3);white-space:nowrap;background:var(--paper);padding:0 3px;
  font-family:var(--sans);font-weight:400}
.ts-overnight{font-size:9px;color:var(--accent);font-family:var(--sans);vertical-align:super;margin-left:1px}

/* ── MAP PIN BUTTON ── */



/* ── TRIP PLANNER ── */
.planner{background:var(--paper);border:1px solid var(--paper3);border-radius:14px;
  overflow:hidden;max-width:580px;margin:0 auto}
.planner-header{background:var(--ink);color:var(--paper);padding:16px 20px;
  display:flex;align-items:center;gap:10px}
.planner-title{font-family:var(--serif);font-size:20px;letter-spacing:-.01em}
.planner-sub{font-size:12px;opacity:.6;margin-top:1px}
.planner-thread{padding:14px 16px;display:flex;flex-direction:column;gap:8px;
  max-height:340px;overflow-y:auto}
.planner-msg{font-size:13px;line-height:1.55;padding:9px 12px;border-radius:10px;max-width:90%}
.planner-msg.bot{background:var(--paper2);color:var(--ink2);align-self:flex-start;
  border-radius:4px 10px 10px 10px}
.planner-msg.user{background:var(--ink);color:var(--paper);align-self:flex-end;
  border-radius:10px 4px 10px 10px}
.planner-msg.saved{background:#f0faf0;border:1px solid #b8e0b8;color:#2a6e2a;
  font-size:12px;align-self:center;border-radius:8px;text-align:center}
.planner-msg.thinking{background:var(--paper2);color:var(--ink3);font-style:italic;
  align-self:flex-start;border-radius:4px 10px 10px 10px}
.planner-input-row{display:flex;gap:8px;padding:12px 16px;
  border-top:1px solid var(--paper3);background:var(--paper)}
.planner-done{padding:10px 16px;border-top:1px solid var(--paper3);
  display:flex;gap:8px;align-items:center;background:#f0faf0}

/* ── CONNECTION RESULTS ── */
.conn-panel{background:var(--paper);border:1px solid var(--paper3);border-radius:10px;
  margin-top:8px;overflow:hidden;grid-column:1/-1}
.conn-header{padding:8px 12px;background:var(--paper2);border-bottom:1px solid var(--paper3);
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);
  display:flex;align-items:center;justify-content:space-between}
.conn-item{padding:10px 12px;border-bottom:1px solid var(--paper2);display:flex;
  align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.conn-item:last-child{border-bottom:none}
.conn-item:hover{background:var(--paper2)}
.conn-time{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap}
.conn-arrow{color:var(--ink4);font-size:11px}
.conn-meta{font-size:11px;color:var(--ink3);flex:1}
.conn-plat{font-size:11px;background:var(--ink);color:var(--paper);border-radius:4px;
  padding:2px 6px;white-space:nowrap}
.conn-add{font-size:11px;color:var(--blue);border:1px solid var(--blue);border-radius:6px;
  padding:3px 8px;background:none;cursor:pointer;white-space:nowrap}
.conn-add:hover{background:var(--blue);color:#fff}
.conn-fallback{padding:10px 12px}
.conn-fallback-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.conn-fallback-link{color:var(--blue);text-decoration:none;font-weight:500}
.conn-fallback-link:hover{text-decoration:underline}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--paper);
  padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;
  animation:fadeIn .2s ease;pointer-events:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

  <div style="display:flex;align-items:center;gap:10px">

  <div class="hdr-right">
    <button class="btn btn-ghost btn-sm" onclick="openEditTrip()" id="editTripBtn">Edit trip</button>
    <button class="btn btn-primary btn-sm" onclick="openAddSeg()">+ Add segment</button>
  </div>
</header>

<div class="app">
<nav class="sidebar" id="sidebar">

</nav>

<main class="main">

  <!-- TRIP BAR -->

    <div style="position:relative">
      <span class="trip-name" id="tripName">—</span>
    </div>

  </div>

  <!-- NL / DIALOG BAR -->

    <!-- summary card -->

    <!-- dialog thread: oldest at top, newest just above input -->

    <!-- connection results panel -->
    <div id="connResults" style="display:none;padding:0 12px 8px"></div>
    <!-- input always at bottom -->

      <input class="nl-input" id="nlInput"
        placeholder="e.g. flight ZRH to HRG Oct 10 07:15 Swiss LX392…"
        onkeydown="handleNlKey(event)">
      <button class="btn btn-primary btn-sm" id="nlBtn" onclick="nlSubmit()">Add</button>

    <button class="btn btn-ghost btn-sm" style="margin-left:auto"
      onclick="document.getElementById('reviewBanner').style.display='none'">Dismiss</button>
  </div>

  <!-- STATUS BAR -->
  <div class="status" id="statusBar" style="display:none">
    <div class="status-item"><div class="status-lbl">Departs</div><div class="status-val" id="sDep">—</div></div>
    <div class="status-item"><div class="status-lbl">Returns</div><div class="status-val" id="sRet">—</div></div>
    <div class="status-item"><div class="status-lbl">Segments</div><div class="status-val" id="sSeg">0</div></div>
    <div class="status-item"><div class="status-lbl">Next up</div><div class="status-val accent" id="sNext">—</div></div>

  <!-- TIMELINE -->

</main>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const API   = '';
const TOKEN = 'd5f9e9b215da795ef927a399c3eba355';
const H     = {'Content-Type':'application/json','X-Token':TOKEN};

// ── STATE ────────────────────────────────────────────────────
let trips = [], currentTrip = null, editingSegId = null;

// ── DIALOG STATE ─────────────────────────────────────────────
let dlg = {
  active:false,
  history:[],
  draft:null,
  avNote:null,
  returnDraft:null,
  returnAvNote:null,
  awaitingReturn:false,
};

// ── BOOT ─────────────────────────────────────────────────────
async function boot() {
  if (window.innerWidth <= 700) document.getElementById('mobMenuBtn').style.display = 'inline-flex';
  await loadTrips();
  if (trips.length) selectTrip(trips[0]);
  else renderEmpty();
}

async function loadTrips() {
  const r = await fetch(`${API}/api/trips/`, {headers:H});
  trips = await r.json();
  renderSidebar();
}

// ── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
  const today = new Date().toISOString().slice(0,10);
  const upcoming = trips.filter(t => !t.end_date || t.end_date >= today);
  const past     = trips.filter(t => t.end_date  && t.end_date <  today);
  upcoming.sort((a,b) => (a.start_date||'').localeCompare(b.start_date||''));
  past.sort((a,b)     => (b.start_date||'').localeCompare(a.start_date||''));

  let html = '';
  if (upcoming.length) {
    html += '<div class="sidebar-section">Upcoming</div>';
    html += upcoming.map(t => sidebarItem(t)).join('');
  }
  if (past.length) {
    html += '<div class="sidebar-section">Past</div>';
    html += past.map(t => sidebarItem(t)).join('');
  }
  if (!html) html = '<div style="padding:12px 14px;font-size:12px;color:var(--ink3)">No trips yet</div>';
  document.getElementById('sidebarContent').innerHTML = html;
}

function sidebarItem(t) {
  const active = currentTrip && t.id === currentTrip.id ? 'active' : '';
  const segCount = t.segments ? t.segments.length : '';
  const dates = (t.start_date || t.end_date)
    ? `${fmtShort(t.start_date)||'?'} – ${fmtShort(t.end_date)||'?'}` : 'No dates';
  return `<div class="sidebar-item ${active}" onclick="sidebarSelect('${t.id}')">
    <div class="sidebar-item-name">${t.name}</div>
    <div class="sidebar-item-date">${dates}</div>
    ${segCount ? `<div class="sidebar-item-seg">${segCount} segment${segCount===1?'':'s'}</div>` : ''}
  </div>`;
}

function sidebarSelect(tripId) {
  const trip = trips.find(t => t.id === tripId);
  if (trip) { selectTrip(trip); closeSidebar(); }
}

function toggleDD() {} // legacy no-op
function renderTripDD() { renderSidebar(); }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mob-open');
  document.getElementById('mobOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mobOverlay').classList.remove('open');
}

async function selectTrip(trip) {
  if (!trip) return;
  currentTrip = trip;
  document.getElementById('tripName').textContent = trip.name;
  const r = await fetch(`${API}/api/trips/${trip.id}`, {headers:H});
  currentTrip = await r.json();
  // Sync segment count back into trips array for sidebar
  const idx = trips.findIndex(t => t.id === currentTrip.id);
  if (idx >= 0) trips[idx] = {...trips[idx], segments: currentTrip.segments};
  renderSidebar();
  renderMeta();
  renderTimeline();
}

function renderMeta() {
  const t = currentTrip;
  const locPart = t.location ? `${t.location} · ` : '';
  const datePart = [fmt(t.start_date), fmt(t.end_date)].filter(Boolean).join(' – ');
  document.getElementById('tripMeta').textContent = locPart + datePart;
  document.getElementById('statusBar').style.display = 'flex';
  document.getElementById('sDep').textContent = fmtShort(t.start_date) || '—';
  document.getElementById('sRet').textContent = fmtShort(t.end_date) || '—';
  const segs = t.segments || [];
  document.getElementById('sSeg').textContent = segs.length;
  if (t.start_date) {
    const diff = Math.ceil((new Date(t.start_date) - new Date()) / 86400000);
    document.getElementById('sNext').textContent =
      diff > 0 ? `${diff}d` : diff === 0 ? 'Today' : 'Past';
  }
  const review = segs.filter(s => s.parse_status === 'needs_review' || s.parse_status === 'failed');
  const rb = document.getElementById('reviewBanner');
  if (review.length) {
    rb.style.display = 'flex';
    document.getElementById('reviewText').textContent =
      `${review.length} segment${review.length>1?'s':''} need${review.length>1?'':'s'} review.`;
  } else {
    rb.style.display = 'none';
  }
}

// ── TIMELINE ─────────────────────────────────────────────────
const TYPE_ICON = {flight:'✈',hotel:'🏨',train:'🚂',taxi:'🚕',car:'🚗',activity:'🎯',other:'📌'};
const BADGE     = {ok:'badge-ok',needs_review:'badge-review',failed:'badge-review',pending:'badge-pending'};
const BADGE_LBL = {ok:'Confirmed',needs_review:'Needs review',failed:'Failed',pending:'Pending'};

function renderTimeline() {
  const tl   = document.getElementById('timeline');
  const segs = (currentTrip.segments || []).slice()
    .sort((a,b) => (a.departs_at||'').localeCompare(b.departs_at||''));
  if (!segs.length) {
    tl.innerHTML = `<div class="empty">
      <div class="empty-title">No segments yet</div>
      <div class="empty-sub">Type in the bar above, or use + Add segment.</div>
    </div>`; return;
  }
  const days = {};
  segs.forEach(s => {
    const day = (s.departs_at||'').slice(0,10) || 'unknown';
    if (!days[day]) days[day] = [];
    days[day].push(s);
  });
  let html = '';
  Object.entries(days).forEach(([day, daySegs]) => {
    html += `<div class="day-label"><span class="day-date">${fmtDay(day)}</span><div class="day-line"></div></div>`;
    daySegs.forEach(s => {
      const isHotel    = s.type === 'hotel';
      const isFlight   = s.type === 'flight' || s.type === 'train';
      const depTime    = depT(s.departs_at);
      const arrTime    = arrT(s.departs_at, s.arrives_at);
      const overnight  = overnightDays(s.departs_at, s.arrives_at);
      const duration   = flightDuration(s.departs_at, s.arrives_at, s.departs_tz, s.arrives_tz);
      const bClass     = s.confirmed ? 'badge-ok' : BADGE[s.parse_status] || 'badge-pending';
      const bLbl       = s.confirmed ? 'Confirmed' : BADGE_LBL[s.parse_status] || 'Pending';
      const nights     = isHotel && s.meta && s.meta.nights ? ` · ${s.meta.nights} nights` : '';

      // Route label
      const orig  = s.origin      || '—';
      const dest  = s.destination || null;
      const routeHtml = dest
        ? `${orig}<span class="arr"> → </span>${dest}`
        : orig;

      // Time strip for flights/trains
      let timeStrip = '';
      if (isFlight && depTime && arrTime) {
        timeStrip = `<div class="time-strip">
          <span class="ts-dep">${depTime}</span>
          <span class="ts-line">${duration ? `<span class="ts-dur">${duration}</span>` : ''}</span>
          <span class="ts-arr">${arrTime}${overnight ? `<sup class="ts-overnight">+${overnight}</sup>` : ''}</span>
        </div>`;
      }

      // Sub-line: carrier · ref
      const subParts = [s.carrier].filter(Boolean);
      const sub = subParts.join(' · ');

      // Hotel-specific card content
      const m = s.meta || {};
      let hotelStrip = '';
      if (isHotel) {
        const ciDate  = (s.departs_at||'').slice(0,10);
        const coDate  = (s.arrives_at||'').slice(0,10);
        const ciTime  = depTime  ? ` at ${depTime}`  : (m.checkin_time  ? ` at ${m.checkin_time}`  : '');
        const coTime  = (s.arrives_at||'').slice(11,16).replace('00:00','') 
                          ? ` at ${(s.arrives_at||'').slice(11,16)}` 
                          : (m.checkout_time ? ` at ${m.checkout_time}` : '');
        const ciStr   = ciDate ? `${fmtShort(ciDate)}${ciTime}` : '—';
        const coStr   = coDate ? `${fmtShort(coDate)}${coTime}` : '—';
        const starsHtml = m.stars ? ' ' + '★'.repeat(Math.min(parseInt(m.stars)||0,5)) : '';
        const phoneHtml = m.phone ? `<div class="hotel-phone">📞 ${m.phone}</div>` : '';
        const addrHtml  = m.address ? `<div class="hotel-addr">📍 ${m.address}</div>` : '';
        hotelStrip = `
          <div class="hotel-dates">
            <span class="hotel-ci"><span class="hotel-dt-lbl">Check-in</span> ${ciStr}</span>
            <span class="hotel-arrow">→</span>
            <span class="hotel-co"><span class="hotel-dt-lbl">Check-out</span> ${coStr}</span>
          </div>
          ${phoneHtml}${addrHtml}`;
      }

      html += `<div class="seg" data-id="${s.id}">
        <div class="seg-tc"><span class="seg-time">${isHotel ? '' : (depTime||'—')}</span><div class="seg-line"></div></div>
        <div class="seg-card ${s.type}" onclick="toggleDetail(this)">
          <div class="seg-top">
            <span class="seg-icon">${TYPE_ICON[s.type]||'📌'}</span>
            <div class="seg-main">
              <div class="seg-route">${isHotel ? (s.carrier||orig) : routeHtml}${!isHotel ? nights : ''}</div>
              ${isHotel ? hotelStrip : (timeStrip || '')}
              ${!isHotel && sub ? `<div class="seg-sub">${sub}</div>` : ''}
              ${isHotel && m.stars ? `<div class="seg-sub">${'★'.repeat(Math.min(parseInt(m.stars)||0,5))} ${m.nights ? m.nights+' nights' : ''}</div>` : ''}
            </div>
            <div class="seg-right">
              ${s.confirmation_ref ? `<div class="conf-ref">${s.confirmation_ref}</div>` : ''}
              <span class="badge ${bClass}">${bLbl}</span>
            </div>
          </div>
          <div class="seg-detail">
            ${detailFields(s)}
            <div style="grid-column:1/-1" class="seg-actions">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditSeg('${s.id}')">Edit</button>
              ${['train','hotel','flight'].includes(s.type) ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();enrichSeg('${s.id}',this)">⟳ Enrich</button>` : ''}
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSeg('${s.id}')">Delete</button>
            </div>
          </div>
        </div>
      </div>`;
      if (isHotel && s.meta && s.meta.nights && s.meta.nights > 1) {
        html += `<div class="bridge">
          <div class="bridge-line"><div class="bridge-bar"></div></div>
          <div class="bridge-lbl">${s.meta.nights} nights · ${s.carrier||s.origin||''}</div>
        </div>`;
      }
    });
  });
  tl.innerHTML = html;
}

function df(lbl, val) {
  if (!val && val !== 0) return '';
  return `<div><div class="det-lbl">${lbl}</div><div class="det-val">${val}</div></div>`;
}

function detailFields(s) {
  const m = s.meta || {};
  const type = s.type;
  let out = '';

  // ── FLIGHT ────────────────────────────────────────────
  if (type === 'flight') {
    if (m.enrich_status === 'needs_flight_number') {
      out += `<div style="grid-column:1/-1;padding:6px 10px;background:#fef3e8;border-radius:6px;font-size:12px;color:#9a6000;border:1px solid #f5d5b0">
        ✏️ ${m.enrich_reason || 'Add a flight number to enable enrichment'}
      </div>`;
    }
    out += df('Cabin', m.cabin_class);
    out += df('Fare', m.fare_type);
    out += df('Terminal dep', m.terminal_departure || null);
    out += df('Gate dep', m.gate || null);
    out += df('Terminal arr', m.terminal_arrival || null);
    out += df('Gate arr', m.gate_arrival || null);
    out += df('Baggage claim', m.baggage_claim || null);
    out += df('Boarding', m.boarding_time);
    out += df('Seat', m.seat);
    out += df('Baggage', m.baggage_allowance);
    out += df('Ticket #', m.ticket_number);
    if (m.delay_minutes > 0) out += df('Delay', `${m.delay_minutes} min`);
    out += df('Dep timezone', s.departs_tz);
    if (s.arrives_tz && s.arrives_tz !== s.departs_tz) out += df('Arr timezone', s.arrives_tz);
    out += df('Price', m.price);
    out += df('Card', m.payment_card);

  }

  // ── TRAIN ─────────────────────────────────────────────
  if (type === 'train') {
    out += df('Service', m.train_number);
    out += df('Class', m.class);
    out += df('Coach', m.coach);
    out += df('Seat', m.seat);
    out += df('Platform dep', m.platform_departure ? `Platform ${m.platform_departure}` : null);
    out += df('Platform arr', m.platform_arrival ? `Platform ${m.platform_arrival}` : null);
    out += df('Dep timezone', s.departs_tz);
    if (s.arrives_tz && s.arrives_tz !== s.departs_tz) out += df('Arr timezone', s.arrives_tz);
    out += df('Price', m.price);

  }

  // ── HOTEL ─────────────────────────────────────────────
  if (type === 'hotel') {
    out += df('Address', m.address);
    out += df('Room', m.room_type);
    out += df('Check-in', m.checkin_time);
    out += df('Check-out', m.checkout_time);
    out += df('Nights', m.nights);
    out += df('Rate', m.rate_plan);
    out += df('Points', m.loyalty_points);
    out += df('Phone', m.phone ? `<a href="tel:${m.phone}" style="color:inherit">${m.phone}</a>` : null);
    out += df('Website', m.website ? `<a href="${m.website}" target="_blank" style="color:var(--blue)">${m.website.replace(/^https?:\/\//,'').slice(0,40)}</a>` : null);
    out += df('Stars', m.stars ? '★'.repeat(Math.min(parseInt(m.stars)||0,5)) : null);
    out += df('Cancellation', m.cancellation_policy);
    out += df('Price', m.price);
    out += df('Card', m.payment_card);

  }

  // ── TAXI ──────────────────────────────────────────────
  if (type === 'taxi') {
    out += df('Driver', m.driver);
    out += df('Phone', m.phone);
    out += df('Dep timezone', s.departs_tz);
    out += df('Price', m.price);
    out += df('Confirmation', s.confirmation_ref);
  }

  // ── UNIVERSAL ─────────────────────────────────────────
  if (m.notes) out += df('Notes', m.notes);
  if (s.parse_status === 'needs_review' || s.parse_status === 'failed') {
    out += `<div><div class="det-lbl">Status</div><div class="det-val warn">Needs manual review</div></div>`;
  }
  // aviationstack_note is a parse-time artifact — not shown in detail view
  return out;
}

function toggleDetail(card) {

  document.querySelectorAll('.seg-detail.open').forEach(d => {

function handleNlKey(e) {
  if (e.key === 'Enter') nlSubmit();
  if (e.key === 'Escape') cancelDialog();
}

async function nlSubmit() {
  const input = document.getElementById('nlInput');
  const text  = input.value.trim();
  if (!text || !currentTrip) { toast('Create a trip first'); return; }

  setNlLoading(true);

  try {
    const body = {
      trip_id:   currentTrip.id,
      message:   text,
      history:   dlg.history,
      draft:     dlg.draft,
      all_trips: buildTripContext(),
    };
    const r   = await fetch(`${API}/api/parse/dialog`, {method:'POST', headers:H, body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    const res = await r.json();

    // Update dialog state
    dlg.active  = true;
    dlg.history = res.history;
    dlg.draft   = res.draft;
    dlg.avNote       = res.aviationstack_note || null;
    dlg.ttNote       = res.timetable_note || null;
    dlg.returnDraft  = res.return_draft || null;
    dlg.returnAvNote = res.return_aviationstack_note || null;

    // Add user message to thread
    appendThread('user', text);
    input.value = '';

    if (res.status === 'connection_search' && res.draft) {
      // Connection search requested
      activateDialog();
      const fromSt = res.draft.origin || '';
      const toSt   = res.draft.destination || '';
      appendThread('bot', res.question || `Searching connections ${fromSt} → ${toSt}…`);
      if (fromSt && toSt) {
        const depDt = (res.draft.departs_at || '').slice(0,16).replace('T',' ');
        const arrDt = (res.draft.arrives_at || '').slice(0,16).replace('T',' ');
        await searchConnections(fromSt, toSt, {
          datetime:      depDt || null,
          arrive_before: arrDt || null,
        });
      }
    } else if (res.status === 'question') {
      // GPT needs more info
      activateDialog();
      appendThread('bot', res.question);
    } else {
      // Ready — show summary card for confirmation
      activateDialog();
      appendThread('bot', 'Got everything I need. Does this look right?');
      renderSummary(res.draft, res.aviationstack_note, res.timetable_note);
    }
  } catch(e) {
    appendThread('bot', 'Something went wrong — please try again.');
    console.error(e);
  } finally {
    setNlLoading(false);
  }
}

function activateDialog() {
  document.getElementById('nlBar').classList.add('dialog-active');
  document.getElementById('dialogThread').style.display = 'flex';
  document.getElementById('nlCancelBtn').style.display  = '';
  document.getElementById('nlBtn').textContent = 'Send';
  document.getElementById('nlInput').placeholder = 'Reply…';
}

function cancelDialog() {
  dlg = {active:false, history:[], draft:null, avNote:null, ttNote:null};
  document.getElementById('nlBar').classList.remove('dialog-active');
  document.getElementById('dialogThread').style.display = 'none';
  document.getElementById('dialogThread').innerHTML = '';
  document.getElementById('summaryArea').innerHTML  = '';
  document.getElementById('nlCancelBtn').style.display = 'none';
  document.getElementById('nlBtn').textContent = 'Add';
  document.getElementById('nlInput').placeholder = 'e.g. flight ZRH to HRG Oct 10 07:15 Swiss LX392…';
  document.getElementById('nlInput').value = '';
  document.getElementById('nlInput').focus();
}

function appendThread(role, text) {
  const thread = document.getElementById('dialogThread');
  const el = document.createElement('div');
  el.className = `dialog-msg ${role}`;
  el.textContent = text;
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
}

function setNlLoading(on) {
  const btn   = document.getElementById('nlBtn');
  const input = document.getElementById('nlInput');
  if (on) {
    btn.disabled = true;
    btn.textContent = '…';
    // show thinking bubble
    const el = document.createElement('div');
    el.className = 'dialog-msg thinking';
    el.id = 'thinkingBubble';
    el.textContent = 'Thinking…';
    const thread = document.getElementById('dialogThread');
    thread.style.display = 'flex';
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
  } else {
    btn.disabled = false;
    btn.textContent = dlg.active ? 'Send' : 'Add';
    const t = document.getElementById('thinkingBubble');
    if (t) t.remove();
  }
  input.disabled = on;
}

// ── SUMMARY CARD ─────────────────────────────────────────────

const TYPE_ICON_MAP = {flight:'✈',hotel:'🏨',train:'🚂',taxi:'🚕',car:'🚗',activity:'🎯',other:'📌'};

function renderSummary(draft, avNote, ttNote) {
  const area = document.getElementById('summaryArea');
  const icon = TYPE_ICON_MAP[draft.type] || '📌';

  const fields = [
    ['Type',        draft.type],
    ['From',        draft.origin],
    ['To',          draft.destination],
    ['Carrier',     draft.carrier],
    ['Flight',      draft.flight_iata],
    ['Departs',     fmtDraftTime(draft.departs_at, draft.departs_tz)],
    ['Arrives',     fmtDraftTime(draft.arrives_at, draft.arrives_tz)],
    ['Ref',         draft.confirmation_ref],
    ['Notes',       draft.meta && draft.meta.notes ? draft.meta.notes : null],
    ['Check-in nights', draft.meta && draft.meta.nights ? draft.meta.nights : null],
  ].filter(([, v]) => v);

  const fieldsHtml = fields.map(([lbl, val]) =>
    `<div class="sum-field">
      <div class="sum-lbl">${lbl}</div>
      <div class="sum-val">${val}</div>
    </div>`
  ).join('');

  const avHtml = avNote ? `
    <div class="av-note">
      <span class="av-note-icon">ℹ</span>
      <span>${avNote}</span>
    </div>` : '';

  const ttHtml = ttNote ? `
    <div class="av-note timetable-note ${ttNote.startsWith('⚠') ? 'tt-warn' : 'tt-ok'}">
      <span>${ttNote}</span>
    </div>` : '';

  area.innerHTML = `
    <div class="summary-card">
      <div class="summary-header">${icon} ${(draft.type||'').toUpperCase()} SUMMARY</div>
      <div class="summary-body">${fieldsHtml}</div>
    </div>
    ${avHtml}
    ${ttHtml}
    <div class="summary-footer">
      <button class="btn btn-ghost btn-sm" onclick="cancelDialog()">Cancel</button>
      <button class="btn btn-ghost btn-sm" onclick="editSummary()">Edit</button>
      <button class="btn btn-accent btn-sm" onclick="confirmSave()">Save segment ✓</button>
    </div>`;
}

function editSummary() {
  // Clear summary, let user keep chatting
  document.getElementById('summaryArea').innerHTML = '';
  appendThread('bot', 'What would you like to change?');
  document.getElementById('nlInput').focus();
}

async function confirmSave() {
  const saveBtn = document.querySelector('.summary-footer .btn-accent');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

  try {
    const draft = {...dlg.draft};
    if (dlg.avNote) draft.aviationstack_note = dlg.avNote;
    if (dlg.ttNote)  draft.timetable_note       = dlg.ttNote;

    const r = await fetch(`${API}/api/parse/dialog/confirm`, {
      method: 'POST', headers: H,
      body: JSON.stringify({trip_id: currentTrip.id, draft}),
    });
    if (!r.ok) throw new Error(await r.text());
    cancelDialog();
    await selectTrip(currentTrip);
    toast('Segment saved ✓');
  } catch(e) {
    toast('Error saving — check console');
    console.error(e);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save segment ✓'; }
  }
}

function fmtDraftTime(dt, tz) {
  if (!dt) return null;
  const date = dt.slice(0,10);
  const time = dt.slice(11,16);
  return tz ? `${date} ${time} (${tz})` : `${date} ${time}`;
}

const TYPE_PLACEHOLDERS = {
  flight:   {from:'ZRH or Zurich',to:'HRG or Hurghada',carrier:'Swiss LX 392',fromLbl:'From',toLbl:'To',carrierLbl:'Flight'},
  hotel:    {from:'City or address',to:'',carrier:'Hotel name',fromLbl:'Location',toLbl:'Check-out date',carrierLbl:'Property'},
  train:    {from:'Bern Hbf',to:'Zürich HB',carrier:'SBB IC 1',fromLbl:'From',toLbl:'To',carrierLbl:'Train'},
  taxi:     {from:'Pickup address',to:'Dropoff address',carrier:'Driver or company name',fromLbl:'Pickup',toLbl:'Dropoff',carrierLbl:'Driver / Company'},
  car:      {from:'Pick-up',to:'Drop-off',carrier:'Hertz / Avis…',fromLbl:'Pick-up',toLbl:'Drop-off',carrierLbl:'Provider'},
  activity: {from:'Location',to:'',carrier:'Operator',fromLbl:'Location',toLbl:'',carrierLbl:'Activity name'},
  other:    {from:'',to:'',carrier:'',fromLbl:'From',toLbl:'To',carrierLbl:'Name'},
};
let currentType = 'flight';

function pickType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  currentType = type;
  const p = TYPE_PLACEHOLDERS[type] || TYPE_PLACEHOLDERS.other;
  document.getElementById('fFrom').placeholder     = p.from;
  document.getElementById('fTo').placeholder       = p.to;
  document.getElementById('fCarrier').placeholder  = p.carrier;
  document.getElementById('lblFrom').textContent   = p.fromLbl;
  document.getElementById('lblTo').textContent     = p.toLbl;
  document.getElementById('lblCarrier').textContent= p.carrierLbl;
  const isHotelType  = type === 'hotel';
  const isFlightType = type === 'flight';
  document.getElementById('arrRow').style.display           = (isHotelType || ['flight','train'].includes(type)) ? 'grid' : 'none';
  document.getElementById('taxiFields').style.display       = type === 'taxi'  ? 'block' : 'none';
  document.getElementById('hotelFields').style.display      = type === 'hotel' ? 'block' : 'none';
  document.getElementById('carrierRow').style.display       = isFlightType ? 'none' : '';
  document.getElementById('flightCarrierRow').style.display = isFlightType ? 'grid' : 'none';
  // Hotel: rename date/time labels
  document.getElementById('lblDepDate').textContent = isHotelType ? 'Check-in date'  : 'Departure date';
  document.getElementById('lblDepTime').textContent = isHotelType ? 'Check-in time'  : 'Departure time';
  document.getElementById('lblArrDate').textContent = isHotelType ? 'Check-out date' : 'Arrival date';
  document.getElementById('lblArrTime').textContent = isHotelType ? 'Check-out time' : 'Arrival time';
  // Hotel: hide "To" field (not meaningful for hotels)
  document.getElementById('fTo').closest('.form-row').style.display = isHotelType ? 'none' : '';
}

function openAddSeg() {
  if (!currentTrip) { toast('Create a trip first'); return; }
  editingSegId = null;
  document.getElementById('segModalTitle').textContent = 'Add segment';
  document.getElementById('segSaveBtn').textContent    = 'Save segment';
  clearSegForm();
  document.getElementById('fDepDate').value = isoToDisplay(currentTrip.start_date || '');

  document.getElementById('segOverlay').classList.add('open');
  document.getElementById('fFrom').focus();

function openEditSeg(id) {
  const seg = currentTrip.segments.find(s => s.id === id);
  if (!seg) return;
  editingSegId = id;
  document.getElementById('segModalTitle').textContent = 'Edit segment';
  document.getElementById('segSaveBtn').textContent    = 'Update segment';
  clearSegForm();
  const typeBtn = [...document.querySelectorAll('.type-btn')]
    .find(b => b.getAttribute('onclick').includes(`'${seg.type}'`));
  if (typeBtn) pickType(typeBtn, seg.type);
  document.getElementById('fFrom').value    = seg.origin || '';
  document.getElementById('fTo').value      = seg.destination || '';
  document.getElementById('fCarrier').value = seg.carrier || '';
  // For flights: split carrier "Swiss LX966" → airline + flight number
  if (seg.type === 'flight') {
    const cv = seg.carrier || '';
    const fm = cv.match(/\b([A-Z]{2}\d{2,4})\b/);
    document.getElementById('fFlightNum').value = fm ? fm[1] : ((seg.meta && seg.meta.flight_iata) || '');
    document.getElementById('fAirline').value   = fm ? cv.replace(fm[1],'').trim() : cv;
  }
  document.getElementById('fDepDate').value = isoToDisplay((seg.departs_at||'').slice(0,10));
  document.getElementById('fDepTime').value = (seg.departs_at||'').slice(11,16);
  document.getElementById('fArrDate').value = isoToDisplay((seg.arrives_at||'').slice(0,10));
  document.getElementById('fArrTime').value = (seg.arrives_at||'').slice(11,16);
  document.getElementById('fDepTz').value   = seg.departs_tz || '';
  document.getElementById('fRef').value     = seg.confirmation_ref || '';
  document.getElementById('fNotes').value   = (seg.meta && seg.meta.notes) || '';
  document.getElementById('fConfirmed').checked = seg.confirmed;
  if (seg.type === 'hotel' && seg.meta) {
    document.getElementById('fHotelAddress').value = seg.meta.address  || '';
    document.getElementById('fHotelPhone').value   = seg.meta.phone    || '';
    document.getElementById('fHotelRoom').value    = seg.meta.room_type|| '';
  }
  document.getElementById('segOverlay').classList.add('open');
}

function clearSegForm() {
  ['fFrom','fTo','fCarrier','fAirline','fFlightNum','fDepDate','fDepTime','fArrDate','fArrTime','fDepTz','fRef','fNotes',
   'fTaxiPhone','fTaxiDriver','fHotelAddress','fHotelPhone','fHotelRoom']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('taxiFields').style.display       = 'none';
  document.getElementById('hotelFields').style.display      = 'none';
  document.getElementById('carrierRow').style.display       = '';
  document.getElementById('flightCarrierRow').style.display = 'none';
  document.getElementById('editAssistPanel').style.display  = 'none';
  document.getElementById('editAssistThread').innerHTML     = '';
  document.getElementById('fConfirmed').checked = false;
  pickType(document.querySelector('.type-btn'), 'flight');
}

function closeSegModal() { document.getElementById('segOverlay').classList.remove('open'); }

async function saveSeg() {
  const depDate = parseDate(document.getElementById('fDepDate').value);
  const depTime = parseTime(document.getElementById('fDepTime').value) || '00:00';
  if (!depDate) { toast('Departure date is required'); return; }
  const arrDate = parseDate(document.getElementById('fArrDate').value);
  const arrTime = parseTime(document.getElementById('fArrTime').value) || '00:00';
  const notes   = document.getElementById('fNotes').value.trim();
  const body = {
    trip_id:          currentTrip.id,
    type:             currentType,
    origin:           document.getElementById('fFrom').value.trim() || null,
    destination:      document.getElementById('fTo').value.trim() || null,
    carrier:          (() => {
      if (currentType === 'flight') {
        const al = document.getElementById('fAirline').value.trim();
        const fn = document.getElementById('fFlightNum').value.trim().toUpperCase();
        return (al && fn) ? `${al} ${fn}` : (al || fn || null);
      }
      return document.getElementById('fCarrier').value.trim() || null;
    })(),
    departs_at:       `${depDate}T${depTime}:00`,
    departs_tz:       document.getElementById('fDepTz').value.trim() || null,
    arrives_at:       arrDate ? `${arrDate}T${arrTime}:00` : null,
    confirmation_ref: document.getElementById('fRef').value.trim() || null,
    confirmed:        document.getElementById('fConfirmed').checked,
    parse_status:     'ok',
    meta:             (() => {
      // Start from existing meta so enrichment data is preserved on edit
      const existing = editingSegId
        ? ((currentTrip.segments.find(s=>s.id===editingSegId)||{}).meta || {})
        : {};
      const m = Object.assign({}, existing);
      if (notes) m.notes = notes; else delete m.notes;
      if (currentType === 'taxi') {
        const ph = document.getElementById('fTaxiPhone').value.trim();
        const dr = document.getElementById('fTaxiDriver').value.trim();
        if (ph) m.phone = ph; if (dr) m.driver = dr;
      }
      if (currentType === 'flight') {
        const fn = document.getElementById('fFlightNum').value.trim().toUpperCase();
        if (fn) m.flight_iata = fn;
      }
      if (currentType === 'hotel') {
        const addr = document.getElementById('fHotelAddress').value.trim();
        const ph   = document.getElementById('fHotelPhone').value.trim();
        const room = document.getElementById('fHotelRoom').value.trim();
        if (addr) m.address   = addr; else if (!addr && m.address) {} // keep existing
        if (ph)   m.phone     = ph;
        if (room) m.room_type = room;
      }
      return m;
    })(),
  };
  const url    = editingSegId ? `${API}/api/segments/${editingSegId}` : `${API}/api/segments/`;
  const method = editingSegId ? 'PATCH' : 'POST';
  const r = await fetch(url, {method, headers:H, body:JSON.stringify(body)});
  if (!r.ok) { toast('Error saving — check console'); console.error(await r.text()); return; }
  closeSegModal();
  await selectTrip(currentTrip);

// ── TIME INPUT AUTO-COLON ─────────────────────────────────────
// Smart time parser: accepts 800, 8:00, 08.00, 8, 830 etc → HH:MM
function parseTime(raw) {
  if (!raw) return '';
  const s = raw.trim().replace(/[.\s]/g, ':');
  // Already has colon
  if (s.includes(':')) {
    const [h, m] = s.split(':').map(p => p.padStart(2,'0'));
    const hh = parseInt(h), mm = parseInt(m)||0;
    if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return raw;
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }
  // Pure digits
  const d = s.replace(/\D/g,'');
  if (d.length === 1 || d.length === 2) {
    const hh = parseInt(d);
    return `${String(hh).padStart(2,'0')}:00`;
  }
  if (d.length === 3) {
    const hh = parseInt(d[0]), mm = parseInt(d.slice(1));
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }
  if (d.length >= 4) {
    const hh = parseInt(d.slice(0,2)), mm = parseInt(d.slice(2,4));
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }
  return raw;
}

// Convert ISO YYYY-MM-DD → DD.MM.YYYY for display in form fields
function isoToDisplay(iso) {
  if (!iso) return '';
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return `${m[3]}.${m[2]}.${m[1]}`;
  return iso;
}

// Smart date parser: accepts DD.MM.YYYY, DD.MM.YY, DD/MM/YYYY → YYYY-MM-DD
function parseDate(raw) {
  if (!raw) return '';
  const s = raw.trim();
  // Already ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // DD.MM.YYYY or DD/MM/YYYY or DD-MM-YYYY
  const m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/);
  if (m) {
    let [, dd, mm, yy] = m;
    if (yy.length === 2) yy = '20' + yy;
    return `${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }
  return s;
}

['fDepTime','fArrTime'].forEach(id => {
  const el = document.getElementById(id);
  // Live: insert colon after 2 digits while typing
  el.addEventListener('input', e => {
    const v = e.target.value;
    const digits = v.replace(/\D/g,'');
    if (digits.length === 4 && !v.includes(':')) {
      e.target.value = digits.slice(0,2)+':'+digits.slice(2,4);
    }
  });
  // On blur: normalise whatever was typed
  el.addEventListener('blur', e => {
    const parsed = parseTime(e.target.value);
    if (parsed) e.target.value = parsed;
  });
});

['fDepDate','fArrDate'].forEach(id => {
  document.getElementById(id).addEventListener('blur', e => {
    const parsed = parseDate(e.target.value);
    if (parsed && parsed !== e.target.value) e.target.value = parsed;
  });
});

// ── HELPERS ───────────────────────────────────────────────────
function fmt(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtShort(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function fmtDay(d) {
  if (d==='unknown') return 'Date unknown';
  return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ── TIME HELPERS ─────────────────────────────────────────────
function depT(departs_at) {
  if (!departs_at) return null;
  const t = departs_at.slice(11,16);
  return t && t !== '00:00' ? t : null;
}

function arrT(departs_at, arrives_at) {
  if (!arrives_at) return null;
  const t = arrives_at.slice(11,16);
  if (!t || t === '00:00') return null;
  return t;
}

function overnightDays(departs_at, arrives_at) {
  if (!departs_at || !arrives_at) return 0;
  const d1 = departs_at.slice(0,10);
  const d2 = arrives_at.slice(0,10);
  if (d1 === d2) return 0;
  const diff = Math.round((new Date(d2) - new Date(d1)) / 86400000);
  return diff > 0 ? diff : 0;
}

function flightDuration(dep_at,arr_at,dep_tz,arr_tz){
  if(!dep_at||!arr_at)return null;
  function toUTC(s,tz){
    const[dp,tp]=s.slice(0,16).split("T");
    const[y,mo,d]=dp.split("-").map(Number);
    const[h,mi]=tp.split(":").map(Number);
    if(!tz)return new Date(y,mo-1,d,h,mi);
    try{
      const u=Date.UTC(y,mo-1,d,h,mi);
      const f=new Intl.DateTimeFormat("en",{timeZone:tz,hour:"2-digit",minute:"2-digit",hour12:false});
      const p={};f.formatToParts(new Date(u)).forEach(x=>p[x.type]=x.value);
      const om=(h-Number(p.hour==="24"?0:p.hour))*60+(mi-Number(p.minute));
      return new Date(u+om*60000);
    }catch(e){return new Date(y,mo-1,d,h,mi);}
  }
  const mins=Math.round((toUTC(arr_at,arr_tz)-toUTC(dep_at,dep_tz))/60000);
  if(mins<=0||mins>24*60)return null;
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?(m>0?`${h}h ${m}m`:`${h}h`):`${m}m`;
}

let _editAssistHistory = [];

function toggleEditAssist() {

function _editAssistAddMsg(role, text) {
  const thread = document.getElementById('editAssistThread');
  const el = document.createElement('div');
  el.className = `edit-assist-msg ${role}`;
  el.textContent = text;
  thread.appendChild(el);

}

async function editAssistSend() {
  const input = document.getElementById('editAssistInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  _editAssistAddMsg('user', text);

  // Build current segment state from form
  const type    = currentType || 'flight';
  const from    = document.getElementById('fFrom').value;
  const to      = document.getElementById('fTo').value;
  const airline = document.getElementById('fAirline')?.value || '';
  const flnum   = document.getElementById('fFlightNum')?.value || '';
  const carrier = flnum ? `${airline} ${flnum}`.trim() : (document.getElementById('fCarrier').value || '');
  const depDate = document.getElementById('fDepDate').value;
  const depTime = document.getElementById('fDepTime').value;
  const arrDate = document.getElementById('fArrDate').value;
  const arrTime = document.getElementById('fArrTime').value;
  const ref     = document.getElementById('fRef').value;
  const notes   = document.getElementById('fNotes').value;

  const segContext = {type, origin:from, destination:to, carrier,
    departs_at: depDate&&depTime ? `${parseDate(depDate)}T${depTime}` : null,
    arrives_at: arrDate&&arrTime ? `${parseDate(arrDate)}T${arrTime}` : null,
    confirmation_ref: ref, notes};

  _editAssistHistory.push({role:'user', content: text});

  try {
    const resp = await fetch(`${API}/api/parse/assist/edit?token=${TOKEN}`, {
      method: 'POST',
      headers: {...H, 'Content-Type': 'application/json'},
      body: JSON.stringify({
        segment: segContext,
        history: _editAssistHistory,
        message: text,
        trip_segments: currentTrip ? (currentTrip.segments || []).map(s => ({
          type: s.type, origin: s.origin, destination: s.destination,
          carrier: s.carrier, departs_at: s.departs_at, arrives_at: s.arrives_at,
          id: s.id
        })) : []
      })
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    _editAssistAddMsg('bot', data.message || 'Done!');
    _editAssistHistory.push({role:'user', content: text});
    _editAssistHistory.push({role:'assistant', content: data.message});

    // Apply updates to form fields
    const u = data.updates || {};
    if (u.origin)        document.getElementById('fFrom').value    = u.origin;
    if (u.destination)   document.getElementById('fTo').value      = u.destination;
    if (u.airline)     { const el = document.getElementById('fAirline');   if (el) el.value = u.airline; }
    if (u.flight_number){ const el = document.getElementById('fFlightNum');if (el) el.value = u.flight_number.toUpperCase(); }
    if (u.flight_iata) { const el = document.getElementById('fFlightNum');if (el) el.value = u.flight_iata.toUpperCase(); }
    if (u.carrier && !u.airline) document.getElementById('fCarrier').value = u.carrier;
    if (u.departs_date)    document.getElementById('fDepDate').value = u.departs_date;
    if (u.departs_time)    document.getElementById('fDepTime').value = u.departs_time;
    if (u.arrives_date)    document.getElementById('fArrDate').value = u.arrives_date;
    if (u.arrives_time)    document.getElementById('fArrTime').value = u.arrives_time;
    if (u.confirmation_ref) document.getElementById('fRef').value   = u.confirmation_ref;
    if (u.notes != null)   document.getElementById('fNotes').value  = u.notes;
    if (u.confirmed != null) document.getElementById('fConfirmed').checked = !!u.confirmed;
  } catch(e) {
    _editAssistAddMsg('bot', 'Something went wrong — please try again.');
    console.error(e);
  }
}

// ── Calendar picker ──────────────────────────────────────────────────────────
const _calState = {};

function showCal(inputId, calId) {
  hideCal(); // close any open
  const el   = document.getElementById(calId);
  const inp  = document.getElementById(inputId);
  const val  = parseDate(inp.value);
  const now  = val ? new Date(val + 'T12:00:00') : new Date();
  _calState[calId] = { inputId, year: now.getFullYear(), month: now.getMonth(), sel: val };
  renderCal(calId);
  el.classList.add('open');
  // Close on outside click
  setTimeout(() => document.addEventListener('click', function _h(e) {
    if (!el.contains(e.target) && e.target !== inp) { hideCal(calId); document.removeEventListener('click', _h); }
  }), 10);
}

function hideCal(calId) {
  if (calId) { document.getElementById(calId)?.classList.remove('open'); return; }
  document.querySelectorAll('.cal-popup.open').forEach(el => el.classList.remove('open'));
}

function renderCal(calId) {
  const s   = _calState[calId];
  const el  = document.getElementById(calId);
  const y   = s.year, m = s.month;
  const today = new Date().toISOString().slice(0,10);
  const monthName = new Date(y, m, 1).toLocaleString('en-GB', {month:'long', year:'numeric'});
  const first = new Date(y, m, 1).getDay(); // 0=Sun
  const startDow = (first + 6) % 7; // Mon=0
  const daysInMonth = new Date(y, m+1, 0).getDate();

  let html = `<div class="cal-header">
    <button class="cal-nav" onclick="calNav('${calId}',-1)">‹</button>
    <span class="cal-month">${monthName}</span>
    <button class="cal-nav" onclick="calNav('${calId}',1)">›</button>
  </div><div class="cal-grid">`;
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => html += `<div class="cal-dow">${d}</div>`);
  for (let i=0; i<startDow; i++) html += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = [
      'cal-day',
      iso === today ? 'today' : '',
      iso === s.sel ? 'sel' : '',
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="calPick('${calId}','${iso}')">${d}</div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function calNav(calId, delta) {
  const s = _calState[calId];
  s.month += delta;
  if (s.month < 0)  { s.month = 11; s.year--; }
  if (s.month > 11) { s.month = 0;  s.year++; }
  renderCal(calId);
}

function calPick(calId, iso) {
  const s = _calState[calId];
  s.sel = iso;
  document.getElementById(s.inputId).value = isoToDisplay(iso);
  renderCal(calId);
  setTimeout(() => hideCal(calId), 120);
}

// ── Trip assistant ────────────────────────────────────────────────────────────
function _tripAssistMsg(role, text) {
  const thread = document.getElementById('tripAssistThread');
  const el = document.createElement('div');
  el.className = `edit-assist-msg ${role}`;
  el.textContent = text;
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
}

async function tripAssistSend() {
  const input = document.getElementById('tripAssistInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  _tripAssistMsg('user', text);

  try {
    const r = await fetch(`${API}/api/parse/assist/trip?token=${TOKEN}`, {
      method: 'POST',
      headers: {...H, 'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text })
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    _tripAssistMsg('bot', d.message);
    if (d.name)       document.getElementById('tName').value  = d.name;
    if (d.start_date) document.getElementById('tStart').value = isoToDisplay(d.start_date);
    if (d.end_date)   document.getElementById('tEnd').value   = isoToDisplay(d.end_date);
  } catch(e) {
    _tripAssistMsg('bot', 'Something went wrong.');
    console.error(e);
  }
}

// Clear trip assistant on modal open
const _origOpenNewTrip = openNewTrip;
openNewTrip = function() {
  _origOpenNewTrip();
  document.getElementById('tripAssistThread').innerHTML = '';
  document.getElementById('tripAssistInput').value = '';
};

// ── TRIP PLANNER ─────────────────────────────────────────────────────────────
let _plannerState = {history: [], trip_id: null, active: false};

function initPlanner() {
  _plannerState = {history: [], trip_id: null, active: true};
}

function openPlanner() {
  // Show planner in main area even when trips exist
  document.getElementById('tripName').textContent = 'Plan a trip';
  document.getElementById('tripMeta').textContent = '';
  document.getElementById('statusBar').style.display = 'none';
  document.getElementById('timeline').innerHTML = `
    <div class="planner" id="plannerPanel">
      <div class="planner-header">
        <div>
          <div class="planner-title">✦ Plan a trip</div>
          <div class="planner-sub">Tell me where you want to go</div>
        </div>
      </div>
      <div class="planner-thread" id="plannerThread">
        <div class="planner-msg bot">Hi! Where would you like to go? Tell me destination, dates, and I'll help build the whole itinerary.</div>
      </div>
      <div class="planner-input-row">
        <input class="form-input" id="plannerInput" placeholder="e.g. Berlin 3–7 June, flying Swiss from Zurich…"
          onkeydown="if(event.key==='Enter')plannerSend()" style="font-size:13px">
        <button class="btn btn-primary" onclick="plannerSend()">Send</button>
      </div>
    </div>`;
  initPlanner();
  setTimeout(() => document.getElementById('plannerInput')?.focus(), 50);
}

function _plannerMsg(role, text) {
  const thread = document.getElementById('plannerThread');
  if (!thread) return;
  const el = document.createElement('div');
  el.className = `planner-msg ${role}`;
  el.textContent = text;
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
  return el;
}

async function plannerSend() {
  const input = document.getElementById('plannerInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;

  _plannerMsg('user', text);
  const thinking = _plannerMsg('thinking', 'Thinking…');

  try {
    const r = await fetch(`${API}/api/parse/plan?token=${TOKEN}`, {
      method: 'POST',
      headers: {...H, 'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: text,
        history: _plannerState.history,
        trip_id: _plannerState.trip_id,
      })
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();

    thinking?.remove();

    // Update state
    _plannerState.history  = d.history || [];
    _plannerState.trip_id  = d.trip_id || _plannerState.trip_id;

    // Show saved segments confirmation
    if (d.summary) _plannerMsg('saved', '✓ ' + d.summary);
    if (d.saved_segments?.length) {
      d.saved_segments.forEach(s => {
        const label = s.carrier
          ? `${s.type}: ${s.origin}→${s.destination} (${s.carrier})`
          : `${s.type}: ${s.origin}→${s.destination}`;
        _plannerMsg('saved', '✓ Saved: ' + label);
      });
    }

    // Show bot question
    if (d.question) _plannerMsg('bot', d.question);

    // If trip was created, refresh sidebar
    if (d.trip_id) {
      await loadTrips();
      renderSidebar();
    }

    // If complete, show finish options
    if (d.status === 'complete' && d.trip_id) {
      _plannerMsg('bot', 'Your trip is ready! 🎉');
      const thread = document.getElementById('plannerThread');
      const doneDiv = document.createElement('div');
      doneDiv.className = 'planner-done';
      doneDiv.innerHTML = `
        <span style="font-size:12px;color:var(--ink2);flex:1">Trip created with ${_plannerState.history.filter(h=>h.role==='user').length} turns</span>
        <button class="btn btn-primary btn-sm" onclick="plannerFinish('${d.trip_id}')">View trip →</button>`;
      thread.appendChild(doneDiv);
      thread.scrollTop = thread.scrollHeight;
      document.querySelector('.planner-input-row').style.display = 'none';
    }

  } catch(e) {
    thinking?.remove();
    _plannerMsg('bot', 'Something went wrong — please try again.');
    console.error(e);
  } finally {
    if (input) input.disabled = false;
    input?.focus();
  }
}

async function plannerFinish(tripId) {
  await loadTrips();
  const trip = trips.find(t => t.id === tripId);
  if (trip) selectTrip(trip);
}

// ── CONNECTION SEARCH ────────────────────────────────────────────────────────

async function searchConnections(fromStation, toStation, options = {}) {
  // options: {datetime, arrive_before, targetEl}
  const targetEl = options.targetEl || document.getElementById('connResults');
  if (!targetEl) return;

  targetEl.style.display = 'block';
  targetEl.innerHTML = `<div class="conn-panel">
    <div class="conn-header">🔍 Searching connections…</div>
  </div>`;

  try {
    const r = await fetch(`${API}/api/parse/connections/search?token=${TOKEN}`, {
      method: 'POST',
      headers: {...H, 'Content-Type': 'application/json'},
      body: JSON.stringify({
        from_station: fromStation,
        to_station: toStation,
        datetime: options.datetime || null,
        arrive_before: options.arrive_before || null,
      })
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    renderConnectionResults(d, fromStation, toStation, targetEl);
  } catch(e) {
    targetEl.innerHTML = `<div class="conn-panel">
      <div class="conn-header" style="color:var(--accent)">Connection search failed</div>
      <div style="padding:10px 12px;font-size:12px;color:var(--ink3)">${e.message}</div>
    </div>`;
  }
}

function renderConnectionResults(d, fromStation, toStation, targetEl) {
  const conns = d.connections || [];
  const fb    = d.fallback;

  let html = `<div class="conn-panel">
    <div class="conn-header">
      <span>🚂 ${fromStation} → ${toStation}</span>
      <button onclick="this.closest('.conn-panel').parentElement.style.display='none'"
        style="background:none;border:none;cursor:pointer;color:var(--ink3);font-size:14px">✕</button>
    </div>`;

  if (conns.length) {
    conns.forEach((c, i) => {
      const plat = c.platform_dep
        ? `<span class="conn-plat">Pl. ${c.platform_dep}</span>` : '';
      const xfer = c.transfers > 0
        ? `${c.transfers} change${c.transfers>1?'s':''}` : 'Direct';
      const dur  = (c.duration||'').replace('00d','').replace(':00','').trim();
      html += `<div class="conn-item" onclick="addConnectionSeg(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div>
          <div class="conn-time">${c.departs.slice(11,16)} <span class="conn-arrow">→</span> ${c.arrives.slice(11,16)}</div>
          <div class="conn-meta">${c.carrier||'Train'} · ${xfer} · ${dur}</div>
        </div>
        ${plat}
        <button class="conn-add" onclick="event.stopPropagation();addConnectionSeg(${JSON.stringify(c).replace(/"/g,'&quot;')})">+ Add</button>
      </div>`;
    });
  }

  if (fb) {
    const suggestions = fb.suggestions || [];
    if (suggestions.length) {
      html += `<div class="conn-fallback">
        <div style="font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:6px">
          ${conns.length ? 'Also try:' : 'No live results — alternatives:'}
        </div>`;
      suggestions.forEach(s => {
        if (s.type === 'taxi') {
          html += `<div class="conn-fallback-item">🚕 ${s.label}
            <a href="${s.search_url}" target="_blank" class="conn-fallback-link">Open in Maps ↗</a>
          </div>`;
        } else {
          html += `<div class="conn-fallback-item">🌐
            <a href="${s.url}" target="_blank" class="conn-fallback-link">${s.label} ↗</a>
            <span style="color:var(--ink4)">${s.note}</span>
          </div>`;
        }
      });
      html += '</div>';
    }
  }

  if (!conns.length && !fb?.suggestions?.length) {
    html += `<div style="padding:12px;font-size:12px;color:var(--ink3)">No connections found for this route.</div>`;
  }

  html += '</div>';
  targetEl.innerHTML = html;
}

async function addConnectionSeg(conn) {
  if (!currentTrip) { toast('Select a trip first'); return; }
  // Build segment from connection result
  const depDate = conn.departs.slice(0,10);
  const depTime = conn.departs.slice(11,16);
  const arrDate = conn.arrives.slice(0,10);
  const arrTime = conn.arrives.slice(11,16);

  const body = {
    trip_id:     currentTrip.id,
    type:        'train',
    origin:      conn.from_name,
    destination: conn.to_name,
    carrier:     conn.carrier || null,
    departs_at:  `${depDate}T${depTime}`,
    arrives_at:  `${arrDate}T${arrTime}`,
    confirmed:   false,
    meta: {
      platform_departure: conn.platform_dep || null,
      platform_arrival:   conn.platform_arr || null,
      source: 'connection-search',
    }
  };

  try {
    const r = await fetch(`${API}/api/segments/?token=${TOKEN}`, {
      method: 'POST',
      headers: {...H, 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    await selectTrip(currentTrip);
    toast(`Added: ${conn.carrier||'Train'} ${depTime}→${arrTime} ✓`);
    // Hide conn panel
    document.getElementById('connResults').style.display = 'none';
  } catch(e) {
    toast('Failed to add segment'); console.error(e);
  }
}

// Detect connection search intent in NL bar
function detectConnectionSearch(text) {
  const lower = text.toLowerCase();
  const keywords = ['connection', 'train from', 'get from', 'how to get', 'travel from',
                    'connection from', 'find a train', 'next train', 'trains from'];
  return keywords.some(k => lower.includes(k));
}
