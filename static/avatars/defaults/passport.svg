<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <rect width="100" height="100" fill="#f5f0e8"/>
  
  <!-- book shadow -->
  <rect x="22" y="12" width="56" height="76" rx="6" fill="#8c3d0a" opacity=".3" transform="translate(3,3)"/>
  <!-- book body -->
  <rect x="22" y="12" width="56" height="76" rx="6" fill="#8c3d0a"/>
  <!-- spine -->
  <rect x="22" y="12" width="10" height="76" rx="6" fill="#c4611a"/>
  <!-- emblem circle -->
  <circle cx="52" cy="46" r="22" fill="#c4611a" opacity=".25"/>
  <circle cx="52" cy="46" r="20" stroke="#d4bfa0" stroke-width="1.5" fill="none"/>
  <ellipse cx="52" cy="46" rx="9" ry="20" stroke="#d4bfa0" stroke-width="1.5" fill="none"/>
  <line x1="32" y1="46" x2="72" y2="46" stroke="#d4bfa0" stroke-width="1.5"/>
  <line x1="34" y1="36" x2="70" y2="36" stroke="#d4bfa0" stroke-width="1"/>
  <line x1="34" y1="56" x2="70" y2="56" stroke="#d4bfa0" stroke-width="1"/>
  <!-- eyes -->
  <circle cx="44" cy="44" r="4" fill="#f5f0e8"/>
  <circle cx="60" cy="44" r="4" fill="#f5f0e8"/>
  <circle cx="44" cy="44" r="2.3" fill="#2c2825"/>
  <circle cx="60" cy="44" r="2.3" fill="#2c2825"/>
  <circle cx="44.9" cy="43.1" r=".9" fill="#f5f0e8"/>
  <circle cx="60.9" cy="43.1" r=".9" fill="#f5f0e8"/>
  <!-- smile -->
  <path d="M43 52 Q52 57 61 52" stroke="#f5f0e8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- page lines -->
  <line x1="34" y1="74" x2="70" y2="74" stroke="#d4bfa0" stroke-width="1.2" opacity=".6"/>
  <line x1="34" y1="79" x2="60" y2="79" stroke="#d4bfa0" stroke-width="1.2" opacity=".6"/>
  <!-- star -->
  <text x="52" y="22" text-anchor="middle" font-size="9" fill="#d4bfa0">★</text>

</svg>