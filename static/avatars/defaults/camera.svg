<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <rect width="100" height="100" fill="#f5f0e8"/>
  
  <!-- body -->
  <rect x="10" y="30" width="80" height="52" rx="10" fill="#5a504a"/>
  <!-- viewfinder bump -->
  <rect x="35" y="18" width="30" height="16" rx="6" fill="#2c2825"/>
  <!-- flash -->
  <rect x="13" y="21" width="16" height="12" rx="4" fill="#d4bfa0"/>
  <!-- shutter button -->
  <circle cx="72" cy="24" r="7" fill="#c4611a"/>
  <circle cx="72" cy="24" r="4.5" fill="#e07a3a"/>
  <!-- lens rings -->
  <circle cx="50" cy="56" r="22" fill="#2c2825"/>
  <circle cx="50" cy="56" r="19" fill="#8c3d0a"/>
  <circle cx="50" cy="56" r="15" fill="#e07a3a"/>
  <!-- lens face -->
  <circle cx="50" cy="56" r="11" fill="#f5f0e8"/>
  <!-- eyes -->
  <circle cx="44" cy="54" r="3.8" fill="#2c2825"/>
  <circle cx="56" cy="54" r="3.8" fill="#2c2825"/>
  <circle cx="45.4" cy="52.7" r="1.4" fill="#f5f0e8"/>
  <circle cx="57.4" cy="52.7" r="1.4" fill="#f5f0e8"/>
  <!-- smile -->
  <path d="M44 61 Q50 66 56 61" stroke="#2c2825" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- strap lugs -->
  <rect x="10" y="40" width="6" height="10" rx="3" fill="#b89a7a"/>
  <rect x="84" y="40" width="6" height="10" rx="3" fill="#b89a7a"/>

</svg>