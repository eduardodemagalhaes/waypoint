<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <rect width="100" height="100" fill="#f5f0e8"/>
  
  <!-- main wing (below fuselage) -->
  <path d="M30 58 L10 85 L65 62 Z" fill="#e07a3a"/>
  <!-- tail wing -->
  <path d="M18 55 L10 70 L32 58 Z" fill="#8c3d0a"/>
  <!-- tail fin -->
  <path d="M20 52 L14 38 L34 52 Z" fill="#8c3d0a"/>
  <!-- fuselage -->
  <ellipse cx="52" cy="52" rx="34" ry="13" fill="#c4611a" transform="rotate(-10 52 52)"/>
  <!-- nose -->
  <ellipse cx="78" cy="42" rx="10" ry="7" fill="#8c3d0a" transform="rotate(-10 78 42)"/>
  <!-- face windows -->
  <circle cx="48" cy="51" r="6" fill="#f5f0e8"/>
  <circle cx="62" cy="47" r="6" fill="#f5f0e8"/>
  <!-- eyes -->
  <circle cx="48" cy="51" r="3.5" fill="#2c2825"/>
  <circle cx="62" cy="47" r="3.5" fill="#2c2825"/>
  <circle cx="49.3" cy="49.7" r="1.3" fill="#f5f0e8"/>
  <circle cx="63.3" cy="45.7" r="1.3" fill="#f5f0e8"/>
  <!-- smile -->
  <path d="M46 57 Q55 62 64 57" stroke="#f5f0e8" stroke-width="1.8" fill="none" stroke-linecap="round" transform="rotate(-10 55 58)"/>
  <!-- engine -->
  <ellipse cx="40" cy="67" rx="9" ry="5" fill="#b89a7a" transform="rotate(-10 40 67)"/>
  <ellipse cx="37" cy="68" rx="5" ry="3" fill="#5a504a" transform="rotate(-10 37 68)"/>
  <!-- stars -->
  <circle cx="12" cy="20" r="2" fill="#d4bfa0" opacity=".6"/>
  <circle cx="20" cy="12" r="1.5" fill="#e07a3a" opacity=".5"/>
  <circle cx="8" cy="35" r="1.5" fill="#d4bfa0" opacity=".4"/>

</svg>